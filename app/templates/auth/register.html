<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    >

    <title>FinBee Register</title>

    <link 
        rel="stylesheet" 
        href="/static/css/auth.css"
    >

    <style>

        .validation-msg {
            font-size: 14px;
            font-weight: 600;
            margin-top: 5px;
            min-height: 18px;
        }

        .error-box-register {
            margin-top: 12px;
            padding: 12px;
            border-radius: 10px;
            background: #ffe5e5;
            color: #d32f2f;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

    </style>

</head>


<body>


<div class="auth-container">

    <div class="auth-card register-card">


        <div class="auth-header">

            <div class="logo">
                🐝
            </div>

            <h1>
                FinBee Register
            </h1>

        </div>



        <form 
            method="POST"
            action="/auth/register"
            class="auth-form"
        >


            <input 
                type="hidden"
                name="login_type"
                value="username"
            >



            <div class="form-group">

                <input
                    type="text"
                    name="nama"
                    value="{{ nama if nama else '' }}"
                    placeholder="Nama Lengkap"
                    required
                >

            </div>




            <div class="form-group">

                <input
                    type="text"
                    id="username"
                    name="login_identifier"
                    value="{{ login_identifier if login_identifier else '' }}"
                    placeholder="Username"
                    required
                >


                <div 
                    id="usernameMsg"
                    class="validation-msg"
                ></div>


            </div>





            <div class="form-group password-wrapper">


                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    required
                >


                <span
                    class="toggle-password"
                    onclick="togglePassword('password', this)"
                >
                    👁️
                </span>


            </div>


            <div 
                id="passwordMsg"
                class="validation-msg"
            ></div>







            <div class="form-group password-wrapper">


                <input
                    type="password"
                    id="confirmPassword"
                    name="confirm_password"
                    placeholder="Konfirmasi Password"
                    required
                >


                <span
                    class="toggle-password"
                    onclick="togglePassword('confirmPassword', this)"
                >
                    👁️
                </span>


            </div>



            <div 
                id="confirmMsg"
                class="validation-msg"
            ></div>







            <div class="double-input">


                <div class="form-group">

                    <input
                        type="number"
                        name="umur"
                        value="{{ umur if umur else '' }}"
                        placeholder="Umur"
                    >

                </div>




                <div class="form-group">


                    <input
                        type="text"
                        id="pekerjaan"
                        name="pekerjaan"
                        value="{{ pekerjaan if pekerjaan else '' }}"
                        placeholder="Pekerjaan"
                    >


                </div>


            </div>






            <button
                type="submit"
                class="btn-login"
            >

                Register

            </button>





            {% if error %}

            <div class="error-box-register">

                Tidak dapat melakukan registrasi.
                Silakan periksa kembali isian Anda.

            </div>

            {% endif %}




        </form>






        <div class="auth-links">


            <a href="/auth/login">

                Sudah punya akun?

            </a>



            <span>
                •
            </span>




            <a href="/auth/reset-password">

                Lupa Password?

            </a>



        </div>



    </div>

</div>





<script>


function togglePassword(
    id,
    icon
){

    const input = document.getElementById(id);


    if(input.type === "password"){

        input.type = "text";
        icon.innerHTML = "🙈";

    }else{

        input.type = "password";
        icon.innerHTML = "👁️";

    }

}





// ======================
// Username Validation
// ======================


const username = document.getElementById(
    "username"
);


const usernameMsg = document.getElementById(
    "usernameMsg"
);


let usernameTimer;



username.addEventListener(
    "input",
    function(){

        clearTimeout(usernameTimer);


        usernameTimer = setTimeout(
            async function(){


                if(username.value.length < 3){

                    usernameMsg.innerHTML = "";

                    return;

                }



                const response = await fetch(
                    `/auth/check-username?login_identifier=${encodeURIComponent(username.value)}`
                );



                const data = await response.json();



                if(data.available){


                    usernameMsg.style.color = "green";

                    usernameMsg.innerHTML =
                        "✓ Username dapat digunakan";


                }else{


                    usernameMsg.style.color = "red";

                    usernameMsg.innerHTML =
                        "✗ Username tidak dapat digunakan";


                }



            },
            400
        );


    }
);








// ======================
// Password Validation
// ======================


const password = document.getElementById(
    "password"
);


const confirmPassword = document.getElementById(
    "confirmPassword"
);


const passwordMsg = document.getElementById(
    "passwordMsg"
);


const confirmMsg = document.getElementById(
    "confirmMsg"
);





function checkPassword(){


    if(password.value === ""){

        passwordMsg.innerHTML = "";

        return;

    }



    if(password.value.length < 8){


        passwordMsg.style.color = "red";


        passwordMsg.innerHTML =
            "✗ Password minimal 8 karakter";



    }else{


        passwordMsg.style.color = "green";


        passwordMsg.innerHTML =
            "✓ Password memenuhi syarat";


    }


}





function checkConfirmPassword(){


    if(confirmPassword.value === ""){

        confirmMsg.innerHTML = "";

        return;

    }



    if(password.value === confirmPassword.value){


        confirmMsg.style.color = "green";


        confirmMsg.innerHTML =
            "✓ Password sesuai";



    }else{


        confirmMsg.style.color = "red";


        confirmMsg.innerHTML =
            "✗ Password tidak sama";


    }


}





password.addEventListener(
    "input",
    function(){

        checkPassword();

        checkConfirmPassword();

    }
);



confirmPassword.addEventListener(
    "input",
    checkConfirmPassword
);







// ======================
// Pekerjaan
// ======================


const pekerjaan = document.getElementById(
    "pekerjaan"
);



pekerjaan.addEventListener(
    "input",
    function(){

        this.value =
            this.value.replace(
                /[^A-Za-z\s]/g,
                ""
            );

    }
);



</script>


</body>

</html>
