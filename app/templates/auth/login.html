<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>FinBee Login</title>

    <link
        rel="stylesheet"
        href="/static/css/auth.css"
    >

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <h1>🐝 FinBee</h1>

            <p class="subtitle">
                Smart Personal Finance Assistant
            </p>

            <form>

                <label>
                    Email atau Username
                </label>

                <input
                    type="text"
                    placeholder="Masukkan email atau username"
                >

                <label>
                    Password
                </label>

                <input
                    type="password"
                    placeholder="Masukkan password"
                >

                <button type="submit">
                    Masuk
                </button>

            </form>

            <div class="divider"></div>

            <a href="#">
                Lupa Password?
            </a>

            <a href="#">
                Belum punya akun? Register
            </a>

        </div>

    </div>

</body>
</html>
