<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Reset Password - FinBee</title>

<link
    rel="stylesheet"
    href="/static/css/auth.css"
>
```

</head>

<body>

```
<div class="auth-container">

    <div class="auth-card">

        <div class="auth-header">

            <div class="logo">
                🐝
            </div>

            <h1>
                Reset Password
            </h1>

        </div>

        <form
            method="POST"
            action="/auth/reset-password"
            class="auth-form"
        >

            <div class="form-group">

                <input
                    type="text"
                    name="login_identifier"
                    placeholder="Email atau Username"
                    required
                >

            </div>

            <div class="form-group password-wrapper">

                <input
                    type="password"
                    id="newPassword"
                    name="new_password"
                    placeholder="Password Baru"
                    required
                >

                <span
                    class="toggle-password"
                    onclick="togglePassword('newPassword', this)"
                >
                    👁️
                </span>

            </div>

            <div class="form-group password-wrapper">

                <input
                    type="password"
                    id="confirmPassword"
                    name="confirm_password"
                    placeholder="Konfirmasi Password Baru"
                    required
                >

                <span
                    class="toggle-password"
                    onclick="togglePassword('confirmPassword', this)"
                >
                    👁️
                </span>

            </div>

            <button
                type="submit"
                class="btn-login"
            >
                Reset Password
            </button>

        </form>

        <div class="auth-links">

            <a href="/auth/login">
                Kembali ke Login
            </a>

        </div>

    </div>

</div>

<script>

    function togglePassword(inputId, icon){

        const input =
            document.getElementById(inputId);

        if(input.type === "password"){

            input.type = "text";
            icon.innerHTML = "🙈";

        }else{

            input.type = "password";
            icon.innerHTML = "👁️";

        }
    }

</script>
```

</body>

</html>
